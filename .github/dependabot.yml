version: 2
# Cooldown: Wait 15 days between dependency update PRs to reduce noise
updates:
  - package-ecosystem: "gomod"
    directory: "/" # Location of package manifests
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 15
  - package-ecosystem: "gomod"
    directory: "/tools"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 15
  - package-ecosystem: "github-actions"
    directory: "/"
    groups:
      "github-actions":
        patterns:
          - "*" # Group all GitHub Actions dependencies together
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 15
